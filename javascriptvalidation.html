<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Validation</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 500px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .gender {
        margin-top: 10px;
      }

      .gender input {
        width: auto;
        margin-right: 5px;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 5px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #007bff;
      }

      .error {
        color: red;
        margin-top: 10px;
      }

      .success {
        color: green;
        font-weight: bold;
        margin-top: 10px;
      }

      .output {
        display: none;
        margin-top: 15px;
        background: #f1f1f1;
        padding: 15px;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Student Registration Form</h2>

      <form id="myForm">
        <label>Full Name</label>
        <input type="text" id="name" />

        <label>Email Address</label>
        <input type="email" id="email" />

        <label>Mobile Number</label>
        <input type="text" id="phone" />

        <label>Date of Birth</label>
        <input type="date" id="dob" />

        <label>Gender</label>

        <div class="gender">
          <input type="radio" name="gender" value="Male" /> Male
          <input type="radio" name="gender" value="Female" /> Female
          <input type="radio" name="gender" value="Other" /> Other
        </div>

        <label>Department</label>

        <select id="department">
          <option value="">Select Department</option>
          <option>AI & DS</option>
          <option>Computer Engineering</option>
          <option>Information Technology</option>
          <option>EXTC</option>
        </select>

        <label>Semester</label>

        <select id="semester">
          <option value="">Select Semester</option>
          <option>Semester I</option>
          <option>Semester II</option>
          <option>Semester III</option>
          <option>Semester IV</option>
        </select>

        <label>Address</label>
        <textarea rows="3" id="address"></textarea>

        <label>Password</label>
        <input type="password" id="password" />

        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" />

        <button type="submit">Register</button>
      </form>

      <p id="message"></p>

      <div id="output" class="output"></div>
    </div>

    <script>
      document
        .getElementById("myForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          let name = document.getElementById("name").value.trim();
          let email = document.getElementById("email").value.trim();
          let phone = document.getElementById("phone").value.trim();
          let department = document.getElementById("department").value;
          let semester = document.getElementById("semester").value;
          let password = document.getElementById("password").value;
          let confirmPassword =
            document.getElementById("confirmPassword").value;

          let message = document.getElementById("message");
          let output = document.getElementById("output");

          let error = "";

          let namePattern = /^[A-Za-z ]+$/;
          let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
          let phonePattern = /^[0-9]{10}$/;

          if (name === "") error += "Name is required.<br>";
          else if (!name.match(namePattern))
            error += "Name must contain only letters.<br>";

          if (!email.match(emailPattern)) error += "Enter valid email.<br>";

          if (!phone.match(phonePattern))
            error += "Phone number must contain exactly 10 digits.<br>";

          if (department === "") error += "Select Department.<br>";

          if (semester === "") error += "Select Semester.<br>";

          if (password.length < 6)
            error += "Password must be at least 6 characters.<br>";

          if (password !== confirmPassword)
            error += "Passwords do not match.<br>";

          if (error !== "") {
            message.innerHTML = error;
            message.className = "error";
            output.style.display = "none";
          } else {
            message.innerHTML = "Registration Successful!";
            message.className = "success";

            output.style.display = "block";

            output.innerHTML = `
<h3>Submitted Details</h3>

<p><b>Name:</b> ${name}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Phone:</b> ${phone}</p>
<p><b>Department:</b> ${department}</p>
<p><b>Semester:</b> ${semester}</p>
`;
          }
        });
    </script>
  </body>
</html>
