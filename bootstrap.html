<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engineering Admission Form</title>

    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f4f6f9;
      }

      .form-header {
        background-color: #0d6efd;
        color: white;
        padding: 20px;
        border-radius: 10px 10px 0 0;
      }
    </style>
  </head>

  <body>
    <div class="container mt-5 mb-5">
      <div class="card shadow-lg">
        <!-- Header -->
        <div class="form-header text-center">
          <h2>D. J. Sanghvi College of Engineering</h2>
          <p class="mb-0">Engineering Admission Form 2026-27</p>
        </div>

        <!-- Form Body -->
        <div class="card-body p-4">
          <form class="needs-validation" novalidate>
            <!-- Personal Information -->
            <h4 class="text-primary mb-3">Personal Information</h4>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" required />
                <div class="invalid-feedback">Please enter first name.</div>
              </div>

              <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" required />
                <div class="invalid-feedback">Please enter last name.</div>
              </div>

              <div class="col-md-6">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Gender</label>
                <select class="form-select" required>
                  <option value="">Choose...</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Blood Group</label>
                <select class="form-select">
                  <option>A+</option>
                  <option>B+</option>
                  <option>AB+</option>
                  <option>O+</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Nationality</label>
                <input type="text" class="form-control" />
              </div>
            </div>

            <hr class="my-4" />

            <!-- Contact Information -->
            <h4 class="text-primary mb-3">Contact Information</h4>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Parent Name</label>
                <input type="text" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Parent Contact</label>
                <input type="tel" class="form-control" required />
              </div>

              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="3"></textarea>
              </div>
            </div>

            <hr class="my-4" />

            <!-- Academic Information -->
            <h4 class="text-primary mb-3">Academic Information</h4>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Department</label>
                <select class="form-select" required>
                  <option value="">Choose Department</option>
                  <option>Artificial Intelligence & Data Science</option>
                  <option>Computer Engineering</option>
                  <option>Information Technology</option>
                  <option>Electronics & Telecommunication</option>
                  <option>Mechanical Engineering</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Semester</label>
                <select class="form-select">
                  <option>Semester I</option>
                  <option>Semester II</option>
                  <option>Semester III</option>
                  <option>Semester IV</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">HSC Percentage</label>
                <input type="number" class="form-control" />
              </div>

              <div class="col-md-6">
                <label class="form-label">CET / JEE Score</label>
                <input type="number" class="form-control" />
              </div>

              <div class="col-md-12">
                <label class="form-label">Upload Documents</label>
                <input type="file" class="form-control" />
              </div>
            </div>

            <hr class="my-4" />

            <!-- Declaration -->
            <div class="form-check">
              <input class="form-check-input" type="checkbox" required />
              <label class="form-check-label">
                I hereby declare that the above information is true and correct.
              </label>
            </div>

            <div class="text-center mt-4">
              <button type="submit" class="btn btn-primary px-4">Submit</button>

              <button type="reset" class="btn btn-secondary px-4">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
